<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Tone Sift</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;700&family=Kalam:wght@300;400;700&family=Quicksand:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script>
        try {
            const storage = JSON.parse(localStorage.getItem('genzTranslator') || '{}');
            const user = storage.user;
            if (user && user.loggedIn) {
                document.addEventListener('DOMContentLoaded', () => {
                    const navProfileName = document.querySelector('.profile-name');
                    if (navProfileName) {
                        navProfileName.textContent = user.name || 'User Name';
                    }
                    const navProfileImage = document.querySelector('.profile-image-nav');
                    if (navProfileImage) {
                        navProfileImage.textContent = (user.name || user.email || 'U').charAt(0).toUpperCase();
                    }
                });
            }
        } catch (e) {
            // ignore
        }
    </script>
</head>
<body>
<nav class="navbar">
    <div class="nav-container">
        <div class="logo">
            <h1 class="brand">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <circle cx="12" cy="12" r="10" fill="#8b5cf6" opacity="0.18"/>
                    <path d="M8 12c1.2-2 3.8-3 6-2" stroke="#8b5cf6" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M8 15c1.6-.5 3.4-.5 5 0" stroke="#7c5cff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>ToneShift</span>
            </h1>
        </div>
        <ul class="nav-menu">
            <li><a href="index.html"> 合 Home</a></li>
            <li><a href="history.html"> 🕮 History</a></li>
            <li><a href="about.html"> ⓘ About</a></li>
            <li><a href="contact.html"> ☎ Contact</a></li>
            <!-- Profile section in nav -->
            <li class="profile-nav">
                <div class="profile-section-nav">
                    <a href="profile.html" class="profile-nav-item">
                        <div class="profile-image-nav">U</div>
                        <div class="profile-text-nav">
                            <div class="profile-name">User Name</div>
                        </div>
                    </a>
                </div>
            </li>
        </ul>

        <!-- login/logout button -->
        <div class="navbar-bottom">
             <a href="login.html" class="logout-btn" id="auth-link">🔐 Login</a>
        </div>

    </div>
</nav>

    <main class="container">
        <div class="auth-container">
            <div class="auth-box">
                <div class="auth-tabs">
                    <button class="auth-tab active" data-tab="signin">Sign In</button>
                    <button class="auth-tab" data-tab="signup">Create Account</button>
                </div>
                
                <!-- Sign In Form -->
                <div id="signin-form-container" class="form-container active">
                    <h2>Welcome Back!</h2>
                    <p class="auth-subtitle">Sign in to access your translation history</p>
                    
                    <form id="login-form">
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" placeholder="Enter your email" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="password">Password</label>
                            <div class="password-field">
                                <input type="password" id="password" placeholder="Enter your password" required>
                                <button type="button" class="toggle-password-btn" data-target="password" aria-pressed="false" aria-label="Toggle password visibility">
                                    <svg class="eye" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                        <circle cx="12" cy="12" r="3"></circle>
                                    </svg>
                                </button>
                            </div>
                        </div>
                        
                        <div class="form-options">
                            <label class="checkbox-label">
                                <input type="checkbox" id="remember">
                                <span>Remember me</span>
                            </label>
                            <a href="#" class="forgot-link">Forgot password?</a>
                        </div>
                        
                        <button type="submit" class="btn-primary btn-full">Sign In</button>
                    </form>
                </div>
                
                <!-- Create Account Form -->
                <div id="signup-form-container" class="form-container">
                    <h2>Create Your Account</h2>
                    <p class="auth-subtitle">Join us to save your translation history</p>
                    
                    <form id="signup-form">
                        <div class="form-group">
                            <label for="signup-name">Full Name</label>
                            <input type="text" id="signup-name" placeholder="Enter your full name" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="signup-email">Email Address</label>
                            <input type="email" id="signup-email" placeholder="Enter your email" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="signup-password">Password</label>
                            <div class="password-field">
                                <input type="password" id="signup-password" placeholder="Create a password" required minlength="6">
                                <button type="button" class="toggle-password-btn" data-target="signup-password" aria-pressed="false" aria-label="Toggle password visibility">
                                    <svg class="eye" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                        <circle cx="12" cy="12" r="3"></circle>
                                    </svg>
                                </button>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="signup-confirm-password">Confirm Password</label>
                            <div class="password-field">
                                <input type="password" id="signup-confirm-password" placeholder="Confirm your password" required>
                                <button type="button" class="toggle-password-btn" data-target="signup-confirm-password" aria-pressed="false" aria-label="Toggle password visibility">
                                    <svg class="eye" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                        <circle cx="12" cy="12" r="3"></circle>
                                    </svg>
                                </button>
                            </div>
                        </div>
                        
                        <div class="form-options">
                            <label class="checkbox-label">
                                <input type="checkbox" id="signup-terms" required>
                                <span>I agree to the <a href="#" style="color: var(--primary-color);">Terms & Conditions</a></span>
                            </label>
                        </div>
                        
                        <button type="submit" class="btn-primary btn-full">Create Account</button>
                    </form>
                </div>
                
                <div id="message" class="message"></div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2025 Tone Sift. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
